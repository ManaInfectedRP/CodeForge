<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#020617"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
    <radialGradient id="glow1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#34d399" stop-opacity="0.30"/>
      <stop offset="100%" stop-color="#34d399" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="140" cy="80" r="260" fill="url(#glow1)"/>
  <circle cx="1080" cy="560" r="280" fill="url(#glow2)"/>

  <text x="80" y="150" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="700" fill="#94a3b8" letter-spacing="1">KODSTIGEN</text>

  <text x="78" y="240" font-family="Segoe UI, Arial, sans-serif" font-size="64" font-weight="800" fill="#f8fafc">Stop reading about code.</text>
  <text x="78" y="310" font-family="Segoe UI, Arial, sans-serif" font-size="64" font-weight="800" fill="url(#brand)">Start running it.</text>

  <text x="80" y="360" font-family="Segoe UI, Arial, sans-serif" font-size="22" fill="#94a3b8">Interactive lessons across 27 languages &amp; technologies. No installs. No setup.</text>

  <g transform="translate(660,400)">
    <rect x="0" y="0" width="470" height="180" rx="14" fill="#0b1220" stroke="#1e293b" stroke-width="1.5"/>
    <circle cx="24" cy="26" r="6" fill="#f87171"/>
    <circle cx="46" cy="26" r="6" fill="#fbbf24"/>
    <circle cx="68" cy="26" r="6" fill="#34d399"/>
    <text x="24" y="66" font-family="Consolas, 'Courier New', monospace" font-size="17">
      <tspan fill="#c084fc">def</tspan>
      <tspan fill="#93c5fd"> greet</tspan>
      <tspan fill="#e2e8f0">(name):</tspan>
    </text>
    <text x="44" y="92" font-family="Consolas, 'Courier New', monospace" font-size="17">
      <tspan fill="#c084fc">return</tspan>
      <tspan fill="#fca5a5"> f"Hello, {name}!"</tspan>
    </text>
    <text x="24" y="126" font-family="Consolas, 'Courier New', monospace" font-size="17">
      <tspan fill="#93c5fd">print</tspan>
      <tspan fill="#e2e8f0">(</tspan>
      <tspan fill="#93c5fd">greet</tspan>
      <tspan fill="#e2e8f0">(</tspan>
      <tspan fill="#fca5a5">"Kodstigen"</tspan>
      <tspan fill="#e2e8f0">))</tspan>
    </text>
    <rect x="20" y="146" width="430" height="1" fill="#1e293b"/>
    <text x="24" y="168" font-family="Consolas, 'Courier New', monospace" font-size="16" fill="#34d399">Hello, Kodstigen!</text>
  </g>
</svg>
